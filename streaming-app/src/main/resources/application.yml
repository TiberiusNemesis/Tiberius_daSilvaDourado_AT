spring:
  application:
    name: music-streaming-ddd
  datasource:
    url: jdbc:h2:mem:streaming;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true   # available at /h2-console for inspecting the H2 base

server:
  port: 8080
